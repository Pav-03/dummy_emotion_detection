services:

  # Service-01 : postgreSQL (mlflow metadata store)
  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - mlflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Service-02 : mlflow server
  mlflow:
    image: python:3.10-slim 
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      BACKEND_URI: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ARTIFACT_ROOT: s3://${MLFLOW_S3_BUCKET}/mlflow-artifacts
    
    ports:
      - "5000:5000"
    
    command: ["bash", "-c", "pip install mlflow psycopg2-binary boto3 --quiet && mlflow server --backend-store-uri $$BACKEND_URI --default-artifact-root $$ARTIFACT_ROOT --host 0.0.0.0 --port 5000"]



  # Service-03 : FastAPI application (emoption detection API)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emotion_detection_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      WT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRY_TIME_MINUTES: ${JWT_EXPIRY_TIME_MINUTES}
      MODEL_PATH: ${MODEL_PATH}
      VECTORIZER_PATH: ${VECTORIZER_PATH}
      MODEL_VERSION: ${MODEL_VERSION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  
  # Service-04 : Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "9090:9090"  
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  # Service-05 : Grafana
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
     

volumes:
  mlflow_pgdata:
  prometheus_data:
  grafana_data:
