name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Code-Quality and Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10.x"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest
      
      - name: Run flake8 for code quality
        run: |
          flake8 src/ \
            --max-line-length=125 \
            --exclude=__pycache__,dummy/ \
            --ignore=E501,W503
      
      - name: Download model from S3
        run: |
          mkdir -p model
          aws s3 cp s3://${{ secrets.MLFLOW_S3_BUCKET }}/model/model.joblib model/model.joblib
          aws s3 cp s3://${{ secrets.MLFLOW_S3_BUCKET }}/model/vectorizer.joblib model/vectorizer.joblib
          echo "Model downloaded:"
          ls -la model/

      - name: Run pytest for unit tests
        run: |
          pytest tests/ -v --tb=short
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          MODEL_PATH: model/model.joblib
          VECTORIZER_PATH: model/vectorizer.joblib
          MODEL_VERSION: v6.0.0

  build:
    name: Build and Push docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set environment variables
        id: vars
        run: |
          echo "Current branch: ${{ github.ref }}"
          echo "DEV_ECR_URI: ${{ secrets.DEV_ECR_URI }}"
          echo "PROD_ECR_URI: ${{ secrets.PROD_ECR_URI }}"
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ECR_REPO=${{ secrets.PROD_ECR_URI}}" >> $GITHUB_OUTPUT
            echo "ENV_NAME=prod" >> $GITHUB_OUTPUT
          else
            echo "ECR_REPO=${{ secrets.DEV_ECR_URI}}" >> $GITHUB_OUTPUT
            echo "ENV_NAME=dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            docker-

      - name: Build and Push Docker image to ECR
        env:
          ECR_REPO: ${{ steps.vars.outputs.ECR_REPO }}
          ENV_NAME: ${{ steps.vars.outputs.ENV_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REPO:$IMAGE_TAG \
            -t $ECR_REPO:$ENV_NAME-latest .

          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:$ENV_NAME-latest 

          echo " Image $ECR_REPO:$IMAGE_TAG and $ECR_REPO:$ENV_NAME-latest pushed successfully"
